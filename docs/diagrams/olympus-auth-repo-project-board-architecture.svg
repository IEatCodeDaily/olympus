<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">Olympus Auth, Repo, Project, and Board Architecture</title>
  <desc id="desc">Architecture showing callers using Hall authorization and Auth Broker, encrypted Secret Store access, GitHub integration, first-class Repos, mandatory Project home Vaults, and native or GitHub-backed Boards.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="1"/></pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#94a3b8"/></marker>
    <marker id="authArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#fb7185"/></marker>
    <style>
      .title{font:700 30px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}.sub{font:15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#94a3b8}.h{font:700 18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}.t{font:14px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#cbd5e1}.tiny{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#94a3b8}.box{fill:#0f172a;stroke-width:2}.control{stroke:#34d399}.security{stroke:#fb7185}.data{stroke:#a78bfa}.external{stroke:#94a3b8}.content{stroke:#22d3ee}.boundary{fill:none;stroke:#334155;stroke-width:2;stroke-dasharray:8 6}.line{fill:none;stroke:#94a3b8;stroke-width:2;marker-end:url(#arrow)}.authline{fill:none;stroke:#fb7185;stroke-width:2;stroke-dasharray:7 5;marker-end:url(#authArrow)}.label{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#e2e8f0}.pill{fill:#1e293b;stroke:#475569;stroke-width:1}
    </style>
  </defs>
  <rect width="1800" height="1180" fill="#020617"/><rect width="1800" height="1180" fill="url(#grid)"/>
  <text x="70" y="62" class="title">Olympus capability, repository, project, and board architecture</text>
  <text x="70" y="92" class="sub">ADRs 0024–0026 · explicit actors · no ambient credentials · one canonical owner per field</text>

  <!-- Edges behind boxes -->
  <path class="authline" d="M270 225H430"/><text x="302" y="211" class="label">capability request</text>
  <path class="authline" d="M710 225H785"/><text x="724" y="211" class="label">allow</text>
  <path class="authline" d="M1065 225H1160"/><text x="1080" y="211" class="label">unwrap</text>
  <path class="authline" d="M925 300V315H1490V245H1530"/><text x="1190" y="308" class="label">brokered scoped call</text>
  <path class="authline" d="M880 300V330"/>
  <path class="line" d="M340 600H510"/><text x="375" y="585" class="label">mandatory home</text>
  <path class="line" d="M210 535V490H1340V505"/>
  <path class="line" d="M340 700H510"/><text x="405" y="685" class="label">owns</text>
  <path class="line" d="M770 700H850V810H900"/><text x="782" y="686" class="label">backend=native</text>
  <path class="line" d="M770 720H830V1020H900"/><text x="775" y="744" class="label">backend=github_issues</text>
  <path class="line" d="M770 735H1080V590H1210"/><text x="850" y="721" class="label">GitHub backend binds Repo</text>
  <path class="line" d="M1340 675V750"/><text x="1355" y="719" class="label">owns PRs</text>
  <path class="line" d="M1250 1020H1485V590H1470"/><text x="1320" y="1005" class="label">GitHub authority</text>
  <path class="line" d="M1190 890H1510"/><text x="1280" y="880" class="label">rebuildable projection</text>
  <path class="line" d="M1250 1050H1510"/><text x="1300" y="1035" class="label">rebuildable projection</text>

  <!-- Top security plane -->
  <rect x="50" y="130" width="1700" height="270" rx="16" class="boundary"/>
  <text x="75" y="165" class="h">SECURITY &amp; EXECUTION PLANE</text>
  <rect x="80" y="190" width="190" height="100" rx="10" class="box external"/><text x="105" y="226" class="h">Callers</text><text x="105" y="253" class="t">User · Agent · MCP</text><text x="105" y="276" class="t">CLI · Plugin · App</text>
  <rect x="430" y="190" width="280" height="100" rx="10" class="box control"/><text x="455" y="224" class="h">Hall authorization</text><text x="455" y="251" class="t">RBAC ∩ capability ∩ grant</text><text x="455" y="275" class="t">actor + target + operation</text>
  <rect x="785" y="190" width="280" height="110" rx="10" class="box security"/><text x="810" y="224" class="h">Auth Broker</text><text x="810" y="251" class="t">resolve · refresh · lease</text><text x="810" y="275" class="t">proxy preferred · audit always</text>
  <rect x="1160" y="190" width="280" height="110" rx="10" class="box data"/><text x="1185" y="224" class="h">Secret Store</text><text x="1185" y="251" class="t">encrypted envelopes only</text><text x="1185" y="275" class="t">key outside secrets.sqlite</text>
  <rect x="1530" y="190" width="190" height="110" rx="10" class="box external"/><text x="1555" y="224" class="h">Providers</text><text x="1555" y="251" class="t">GitHub · AWS</text><text x="1555" y="275" class="t">MCP services · APIs</text>
  <rect x="790" y="330" width="270" height="45" rx="22" class="pill"/><text x="820" y="359" class="t">Envoy: ephemeral delivery only</text>

  <!-- Resource plane -->
  <rect x="50" y="435" width="1700" height="675" rx="16" class="boundary"/>
  <text x="75" y="470" class="h">RESOURCE &amp; CONTENT PLANE</text>
  <rect x="80" y="535" width="260" height="220" rx="10" class="box control"/><text x="105" y="575" class="h">Project</text><text x="105" y="608" class="t">Hall: identity + org + grants</text><text x="105" y="638" class="t">exactly one home Vault</text><text x="105" y="668" class="t">references Repos/Vaults</text><text x="105" y="698" class="t">owns durable Boards</text><text x="105" y="728" class="tiny">Deleting Project never deletes Vault</text>
  <rect x="510" y="505" width="260" height="145" rx="10" class="box content"/><text x="535" y="545" class="h">Home Vault</text><text x="535" y="578" class="t">project.json · context/*.md</text><text x="535" y="608" class="t">README · card prose · jj</text><text x="535" y="632" class="tiny">portable content ≠ imported privilege</text>
  <rect x="510" y="675" width="260" height="125" rx="10" class="box control"/><text x="535" y="715" class="h">Board resource</text><text x="535" y="748" class="t">immutable backend kind</text><text x="535" y="775" class="t">native | github_issues</text>
  <rect x="1210" y="505" width="260" height="170" rx="10" class="box control"/><text x="1235" y="545" class="h">Repo resource</text><text x="1235" y="578" class="t">provider repository ID</text><text x="1235" y="608" class="t">GitHub App connection ref</text><text x="1235" y="638" class="tiny">clone is Envoy materialization</text>
  <rect x="1210" y="750" width="260" height="105" rx="10" class="box external"/><text x="1235" y="790" class="h">Pull requests</text><text x="1235" y="823" class="t">Repo-owned; cards only link</text>

  <rect x="900" y="750" width="290" height="190" rx="10" class="box data"/><text x="925" y="790" class="h">Native Board</text><text x="925" y="823" class="t">board.db: structured state</text><text x="925" y="853" class="t">comments: rows + Markdown body</text><text x="925" y="883" class="t">cards/DEV-0042.md: prose</text><text x="925" y="913" class="tiny">logical cr-sqlite sync; DB ignored by jj</text>
  <rect x="900" y="965" width="350" height="115" rx="10" class="box external"/><text x="925" y="1005" class="h">GitHub Issues Board</text><text x="925" y="1038" class="t">issues + comments remain authoritative</text><text x="925" y="1065" class="tiny">no editable native DB/Markdown mirror</text>
  <rect x="1510" y="750" width="190" height="330" rx="10" class="box control"/><text x="1535" y="790" class="h">Hall views</text><text x="1535" y="825" class="t">cross-board search</text><text x="1535" y="855" class="t">allocation</text><text x="1535" y="885" class="t">move sagas</text><text x="1535" y="915" class="t">operation audit</text><text x="1535" y="945" class="tiny">rebuildable</text><text x="1535" y="975" class="tiny">not a second</text><text x="1535" y="998" class="tiny">writable card truth</text>

  <!-- Footer legend -->
  <rect x="70" y="1130" width="18" height="18" rx="4" class="box control"/><text x="98" y="1145" class="tiny">Hall/control</text>
  <rect x="230" y="1130" width="18" height="18" rx="4" class="box security"/><text x="258" y="1145" class="tiny">security boundary</text>
  <rect x="430" y="1130" width="18" height="18" rx="4" class="box data"/><text x="458" y="1145" class="tiny">structured data</text>
  <rect x="620" y="1130" width="18" height="18" rx="4" class="box content"/><text x="648" y="1145" class="tiny">human-owned content</text>
  <rect x="845" y="1130" width="18" height="18" rx="4" class="box external"/><text x="873" y="1145" class="tiny">external/provider authority</text>
  <text x="1210" y="1145" class="tiny">Dashed rose = authenticated capability/secret path</text>
</svg>
