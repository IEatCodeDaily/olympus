name: e2e
on: [push, pull_request]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: jj-cli@0.43.0
      - run: cargo test --workspace
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --check

  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bash scripts/install-maestro.sh
      - run: cd ui && bash scripts/test-install-maestro-apparmor.sh
      - run: cd ui && sudo bash scripts/install-maestro-apparmor.sh
      - run: sudo apt-get install -y ffmpeg
      - run: echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - run: cd ui && bun run typecheck
      - run: cd ui && bun run test
      - run: cd ui && bun run build
      - run: cd ui && bun run test:e2e
        env:
          CI: "true"
      - run: cd ui && bash scripts/evidence-bundle.sh
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-evidence
          path: ui/test-evidence/
          retention-days: 14
