url: ${MAESTRO_BASE_URL}/fleet
name: Mobile fleet overview loads
properties:
  junitId: olympus-mobile-fleet-overview
  junitClassname: ui.mobile
---
- launchApp
- extendedWaitUntil:
    visible: "Fleet overview"
    timeout: 15000
- assertVisible: "local"
- assertVisible: "gpu-box"
- takeScreenshot:
    path: screenshots/mobile-fleet-overview
