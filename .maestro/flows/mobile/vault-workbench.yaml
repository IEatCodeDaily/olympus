url: ${MAESTRO_BASE_URL}/vaults
name: Vault mobile Milkdown rich editor
properties:
  junitId: olympus-vault-workbench-mobile
  junitClassname: ui.mobile
---
- launchApp
- extendedWaitUntil:
    visible: "Save"
    timeout: 15000
- assertVisible: "Save"
- assertVisible: "Delete"
- assertVisible: "Cancel"
- tapOn:
    point: "50%,50%"
- inputText: "mobile-"
- assertVisible: ".*\\*"
- tapOn: "Save"
- tapOn:
    point: "94%,11%"
- tapOn: "Edit source"
- takeScreenshot:
    path: screenshots/vault-mobile-source-escape
