url: ${MAESTRO_BASE_URL}/vaults
name: Vault lossless editor and integrated pane chrome
properties:
  junitId: olympus-vault-workbench
  junitClassname: ui.mock
---
- launchApp
- extendedWaitUntil:
    visible: "New Note"
    timeout: 15000
- tapOn: "acp-wire-spike.md"
- extendedWaitUntil:
    visible: "Save"
    timeout: 10000
- assertVisible: "Save"
- assertVisible: "Delete"
- assertVisible: "B"
- assertNotVisible: "Edit"
- assertNotVisible: "Cancel"
- assertNotVisible: "Rich"
- assertNotVisible: "Source"
- takeScreenshot:
    path: screenshots/vault-lossless-editor
- tapOn:
    point: "94%,7%"
- takeScreenshot:
    path: screenshots/vault-integrated-tabs-split
