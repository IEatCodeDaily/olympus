url: ${MAESTRO_BASE_URL}/vaults
name: Vault Milkdown rich editor and source escape hatch
properties:
  junitId: olympus-vault-workbench
  junitClassname: ui.mock
---
- launchApp
- extendedWaitUntil:
    visible: "New Note"
    timeout: 15000
- tapOn: "acp-wire-spike.md"
- extendedWaitUntil:
    visible: "Save"
    timeout: 10000
- assertVisible: "Save"
- assertVisible: "Delete"
- assertVisible: "Cancel"
- assertVisible: "Note actions"
- tapOn:
    point: "64%,45%"
- inputText: " rich"
- assertVisible: ".*\\*"
- takeScreenshot:
    path: screenshots/vault-milkdown-rich-editor
- tapOn: "Save"
- assertNotVisible: ".*\\*"
- tapOn: "Note actions"
- tapOn: "Edit source"
- assertVisible: "B"
- takeScreenshot:
    path: screenshots/vault-explicit-source-editor
- tapOn: "Note actions"
- tapOn: "Edit rich"
- tapOn: "conflicted-note.md"
- assertVisible: ".*unresolved jj conflict.*"
- takeScreenshot:
    path: screenshots/vault-conflict-source-editor
- tapOn:
    point: "94%,7%"
- takeScreenshot:
    path: screenshots/vault-integrated-tabs-split
